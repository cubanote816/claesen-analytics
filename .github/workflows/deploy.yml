name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'

jobs:
  deploy:
    name: Deploy to prod-priv-01
    runs-on: [self-hosted, linux, prod]
    timeout-minutes: 15

    steps:
      - name: Deploy
        run: |
          sudo bash /opt/claesen/scripts/deploy.sh "${{ inputs.branch || github.ref_name }}"

      - name: Verify deployment
        run: |
          curl -sk --resolve backoffice.claesen.local:443:127.0.0.1 \
            https://backoffice.claesen.local/ \
            -o /dev/null \
            -w "HTTP %{http_code}" | grep -q "HTTP 200" && \
            echo "Deploy verificado OK" || \
            echo "ADVERTENCIA: health check retornó codigo inesperado"
