name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'main'

jobs:
  deploy:
    name: Deploy to prod-priv-01
    runs-on: [self-hosted, linux, prod]
    timeout-minutes: 15

    steps:
      - name: Deploy
        run: |
          sudo bash /opt/claesen/scripts/deploy.sh "${{ inputs.branch || github.ref_name }}"

      - name: Verify deployment
        run: |
          CODE=$(curl -skL https://backoffice.claesen.local/ -o /dev/null -w "%{http_code}")
          echo "Health check: HTTP $CODE"
          [[ "$CODE" == "200" || "$CODE" == "302" ]] && echo "Deploy verificado OK" || { echo "ERROR: HTTP $CODE inesperado"; exit 1; }
