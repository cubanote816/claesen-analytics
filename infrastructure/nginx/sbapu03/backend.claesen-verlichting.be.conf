server {
    listen 80;
    listen [::]:80;
    server_name backend.claesen-verlichting.be;
    return 301 https://backend.claesen-verlichting.be$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name backend.claesen-verlichting.be;

    ssl_certificate     /etc/letsencrypt/live/backend.claesen-verlichting.be/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/backend.claesen-verlichting.be/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /var/www/www.claesen-verlichting.be/public;
    index index.html index.htm;

    server_tokens off;
    client_max_body_size 20M;

    location / {
        try_files $uri $uri/index.html $uri.html /index.html;
    }

    location /v1/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $cors_allowed_origin;
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-XSRF-TOKEN, Accept';
            add_header 'Access-Control-Max-Age' '86400';
            return 204;
        }

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;
        proxy_hide_header Vary;

        add_header 'Access-Control-Allow-Origin' $cors_allowed_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Vary' 'Origin' always;

        proxy_pass https://127.0.0.1:9443;
        proxy_ssl_verify      off;
        proxy_ssl_server_name on;
        proxy_ssl_name        backoffice.claesen.local;
        proxy_set_header      Host backoffice.claesen.local;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Accept-Encoding "";
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffer_size     128k;
        proxy_buffers         4 256k;
        proxy_busy_buffers_size 256k;
        proxy_redirect        https://backoffice.claesen.local https://backend.claesen-verlichting.be;
        gzip                  off;
        sub_filter            "https://backoffice.claesen.local" "https://backend.claesen-verlichting.be";
        sub_filter_once       off;
        sub_filter_types      *;
    }

    location /api/ {
        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $cors_allowed_origin;
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, X-Requested-With, X-XSRF-TOKEN, Accept';
            add_header 'Access-Control-Max-Age' '86400';
            return 204;
        }

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Max-Age;
        proxy_hide_header Vary;

        add_header 'Access-Control-Allow-Origin' $cors_allowed_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Vary' 'Origin' always;

        proxy_pass https://127.0.0.1:9443;
        proxy_ssl_verify      off;
        proxy_ssl_server_name on;
        proxy_ssl_name        backoffice.claesen.local;
        proxy_set_header      Host backoffice.claesen.local;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_set_header      Accept-Encoding "";
        proxy_read_timeout    60s;
        proxy_buffering       on;
        proxy_buffer_size     128k;
        proxy_buffers         4 256k;
        proxy_busy_buffers_size 256k;
        proxy_redirect        https://backoffice.claesen.local https://backend.claesen-verlichting.be;
        gzip                  off;
        sub_filter            "https://backoffice.claesen.local" "https://backend.claesen-verlichting.be";
        sub_filter_once       off;
        sub_filter_types      *;
    }

    location /storage/ {
        proxy_pass https://127.0.0.1:9443;
        proxy_ssl_verify      off;
        proxy_ssl_server_name on;
        proxy_ssl_name        backoffice.claesen.local;
        proxy_set_header      Host backoffice.claesen.local;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;

        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;

        add_header 'Access-Control-Allow-Origin' $cors_allowed_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' $cors_allowed_origin;
            add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS';
            add_header 'Access-Control-Allow-Credentials' 'true';
            add_header 'Access-Control-Max-Age' 86400;
            return 204;
        }
    }

    location ^~ /.well-known/acme-challenge/ {
        allow all;
    }

    location ~ /\.(?!well-known) {
        deny all;
    }

    access_log /var/log/nginx/backend-claesen.access.log;
    error_log  /var/log/nginx/backend-claesen.error.log;
}
